services:
    app:
        build:
            context: .
            dockerfile: docker/app/Dockerfile
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        environment:
            APP_ENV: production
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        networks:
            - appnet
        restart: unless-stopped

    worker:
        build:
            context: .
            dockerfile: docker/app/Dockerfile
        working_dir: /var/www/html
        command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
        volumes:
            - ./:/var/www/html
        depends_on:
            - app
        networks:
            - appnet
        restart: unless-stopped

    nginx:
        image: nginx:alpine
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - appnet
        restart: unless-stopped

    mysql:
        image: mysql:8.0
        environment:
            MYSQL_DATABASE: todo_api
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - appnet
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-proot"]
            interval: 10s
            timeout: 5s
            retries: 10
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        networks:
            - appnet
        restart: unless-stopped

volumes:
    mysql_data:

networks:
    appnet:
        driver: bridge
