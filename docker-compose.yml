version: "3.9"

services:

    api:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: api
        volumes:
            - ./:/var/www/html
        working_dir: /var/www/html
        depends_on:
            - mysql
            - redis
        networks:
            - backend
        expose:
            - "9000"

    worker:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: worker
        command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
        volumes:
            - ./:/var/www/html
        depends_on:
            - redis
            - mysql
        networks:
            - backend

    scheduler:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: scheduler
        command: php artisan schedule:work
        volumes:
            - ./:/var/www/html
        depends_on:
            - redis
            - mysql
        networks:
            - backend

    nginx:
        image: nginx:alpine
        container_name: nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - api
        networks:
            - backend

    mysql:
        image: mysql:8.0
        container_name: mysql
        environment:
            MYSQL_DATABASE: todo_api
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - backend
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        container_name: redis
        networks:
            - backend
        restart: unless-stopped

volumes:
    mysql_data:

networks:
    backend:
        driver: bridge
