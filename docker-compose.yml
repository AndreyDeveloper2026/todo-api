services:

    app:
        build:
            context: .
            dockerfile: docker/app/Dockerfile
        container_name: api
        volumes:
            - ./:/var/www/html
        working_dir: /var/www/html
        depends_on:
            - redis
            - mysql
        restart: unless-stopped
        networks:
            - appnet

    worker:
        build:
            context: .
            dockerfile: docker/worker/Dockerfile
        container_name: worker
        volumes:
            - ./:/var/www/html
        working_dir: /var/www/html
        command: php artisan events:consume
        depends_on:
            - redis
            - mysql
        restart: unless-stopped
        networks:
            - appnet

    nginx:
        image: nginx:alpine
        container_name: nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        restart: unless-stopped
        networks:
            - appnet

    redis:
        image: redis:7-alpine
        container_name: redis
        restart: unless-stopped
        networks:
            - appnet

    mysql:
        image: mysql:8.0
        container_name: mysql
        environment:
            MYSQL_DATABASE: todo_api
            MYSQL_ROOT_PASSWORD: root
            MYSQL_USER: laravel
            MYSQL_PASSWORD: laravel
        volumes:
            - mysql_data:/var/lib/mysql
        restart: unless-stopped
        networks:
            - appnet
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    mysql_data:

networks:
    appnet:
        driver: bridge
