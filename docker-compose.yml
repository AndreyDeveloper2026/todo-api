services:

    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: app
        volumes:
            - ./:/var/www/html
        working_dir: /var/www/html
        depends_on:
            - mysql
            - redis
        networks:
            - appnet

    worker:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: worker
        command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
        volumes:
            - ./:/var/www/html
        working_dir: /var/www/html
        depends_on:
            - mysql
            - redis
        networks:
            - appnet

    scheduler:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: scheduler
        command: php artisan schedule:work
        volumes:
            - ./:/var/www/html
        working_dir: /var/www/html
        depends_on:
            - mysql
            - redis
        networks:
            - appnet

    nginx:
        image: nginx:alpine
        container_name: nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - appnet

    mysql:
        image: mysql:8.0
        container_name: mysql
        environment:
            MYSQL_DATABASE: todo_api
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - appnet

    redis:
        image: redis:7-alpine
        container_name: redis
        networks:
            - appnet

volumes:
    mysql_data:

networks:
    appnet:
        driver: bridge
